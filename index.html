<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spin Diskon UMKM 🎡</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <!-- Theme Toggle -->
  <div class="theme-toggle">
    <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">
      <i class="fas fa-moon" id="theme-icon"></i>
    </button>
  </div>

  <!-- Login Section -->
  <div id="login-section" class="glass-card p-8 w-full max-w-md text-center animate-scale-in">
    
    <!-- Logo/Icon -->
    <div class="mb-6">
      <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center animate-float">
        <i class="fas fa-ticket text-4xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-gradient">Spin Diskon</h1>
      <p class="text-secondary mt-2">UMKM Festival 2024</p>
    </div>

    <p class="text-secondary mb-6">Masuk dengan Google untuk mulai bermain dan menangkan voucher diskon menarik!</p>
    
    <!-- Google Sign-In -->
    <div id="g_id_onload"
         data-client_id="88663261491-uugvuvfgrq20ftg481k1l6evouh98uon.apps.googleusercontent.com"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleGoogleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>

    <div id="auth-error" class="hidden mt-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm"></div>
    
    <!-- Decorative elements -->
    <div class="mt-6 pt-6 border-t border-white/10">
      <p class="text-xs text-muted">
        <i class="fas fa-shield-alt mr-1"></i>
        Login aman & terjamin privasinya
      </p>
    </div>
  </div>

  <!-- Registration Section -->
  <div id="register-section" class="hidden glass-card p-8 w-full max-w-md animate-scale-in">
    <div class="text-center mb-6">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gradient-to-br from-green-500 via-cyan-500 to-blue-500 flex items-center justify-center animate-float">
        <i class="fas fa-user-plus text-3xl text-white"></i>
      </div>
      <h2 class="text-2xl font-bold">Daftar Sekarang</h2>
      <p class="text-secondary mt-2 text-sm">Lengkapi data diri Anda</p>
    </div>
    
    <!-- Google Info -->
    <div class="glass-card p-4 mb-6 flex items-center gap-4">
      <img id="register-avatar" src="" alt="Avatar" class="avatar avatar-sm">
      <div class="text-left">
        <div id="register-name" class="font-semibold"></div>
        <div id="register-email" class="text-sm text-muted"></div>
      </div>
    </div>

    <form id="register-form" class="space-y-4">
      <!-- Role Selection -->
      <div class="input-group">
        <label class="block text-sm font-medium mb-2 text-left">
          <i class="fas fa-user-tag mr-2 text-indigo-400"></i>Saya adalah *
        </label>
        <select id="role" name="role" required class="select">
          <option value="">Pilih role...</option>
          <option value="siswa">🎓 Siswa</option>
          <option value="guru">👨‍🏫 Guru/Karyawan</option>
          <option value="mitra">🏪 Mitra (UMKM)</option>
        </select>
      </div>

      <!-- WhatsApp -->
      <div class="input-group">
        <input type="text" id="noWa" name="noWa" required placeholder="Nomor WhatsApp" class="input">
        <i class="input-icon fas fa-phone"></i>
      </div>

      <!-- Kelas (for siswa) -->
      <div id="kelas-field" class="hidden input-group">
        <label class="block text-sm font-medium mb-2 text-left">
          <i class="fas fa-school mr-2 text-green-400"></i>Kelas
        </label>
        <input type="text" id="kelas" name="kelas" placeholder="Contoh: XII IPA 1" class="input">
        <i class="input-icon fas fa-door-open"></i>
      </div>

      <!-- Sekolah (optional) -->
      <div id="sekolah-field" class="hidden input-group">
        <label class="block text-sm font-medium mb-2 text-left">
          <i class="fas fa-building mr-2 text-purple-400"></i>Sekolah (Opsional)
        </label>
        <input type="text" id="sekolah" name="sekolah" placeholder="Nama sekolah" class="input">
        <i class="input-icon fas fa-university"></i>
      </div>

      <!-- MITRA Fields -->
      <div id="mitra-fields" class="hidden space-y-4">
        <div class="input-group">
          <label class="block text-sm font-medium mb-2 text-left">
            <i class="fas fa-store mr-2 text-orange-400"></i>Nama Toko/UMKM *
          </label>
          <input type="text" id="namaMitra" name="namaMitra" placeholder="Nama toko Anda" class="input">
          <i class="input-icon fas fa-shopping-bag"></i>
        </div>
        <div class="input-group">
          <label class="block text-sm font-medium mb-2 text-left">
            <i class="fas fa-tags mr-2 text-pink-400"></i>Kategori *
          </label>
          <select id="kategori" name="kategori" class="select">
            <option value="">Pilih kategori...</option>
            <option value="makanan">🍔 Makanan</option>
            <option value="minuman">🥤 Minuman</option>
            <option value="jasa">🔧 Jasa</option>
            <option value="lainnya">📦 Lainnya</option>
          </select>
        </div>
        <div class="input-group">
          <label class="block text-sm font-medium mb-2 text-left">
            <i class="fas fa-map-marker-alt mr-2 text-red-400"></i>Alamat *
          </label>
          <textarea id="alamat" name="alamat" placeholder="Alamat toko" class="textarea"></textarea>
        </div>
      </div>

      <div id="register-error" class="hidden p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm"></div>

      <button type="submit" class="btn btn-primary w-full">
        <i class="fas fa-rocket"></i>
        Daftar Sekarang
      </button>
      
      <button type="button" id="cancel-register" class="btn btn-secondary w-full">
        <i class="fas fa-arrow-left"></i>
        Batal
      </button>
    </form>
  </div>

  <script>
    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        icon.className = 'fas fa-sun';
      } else {
        html.setAttribute('data-theme', 'dark');
        icon.className = 'fas fa-moon';
      }
    }
  </script>

  <script type="module">
    import googleAuth from './js/auth/googleAuth.js';

    // Initialize auth
    googleAuth.init();

    // Global callback for Google Sign-In
    window.handleGoogleCredentialResponse = async (response) => {
      await googleAuth.handleCredentialResponse(response);
    };

    // Handle auth state changes
    googleAuth.onAuthChange((user, extra) => {
      if (user) {
        // User registered - redirect handled by module
      } else if (extra && extra.needRegister) {
        // Show registration form
        showRegisterForm(extra.googleUser);
      } else {
        showLoginSection();
      }
    });

    // Check if already logged in
    if (googleAuth.isLoggedIn()) {
      googleAuth.routeToDashboard(googleAuth.getRole());
    }

    // Show login section
    function showLoginSection() {
      document.getElementById('login-section').classList.remove('hidden');
      document.getElementById('register-section').classList.add('hidden');
    }

    // Show register form
    function showRegisterForm(googleUser) {
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('register-section').classList.remove('hidden');
      
      // Fill Google info
      document.getElementById('register-avatar').src = googleUser.picture;
      document.getElementById('register-name').textContent = googleUser.name;
      document.getElementById('register-email').textContent = googleUser.email;
      
      // Clear form
      document.getElementById('register-form').reset();
      toggleFields();
    }

    // Toggle fields based on role
    document.getElementById('role').addEventListener('change', toggleFields);

    function toggleFields() {
      const role = document.getElementById('role').value;
      
      // Reset all
      document.getElementById('kelas-field').classList.add('hidden');
      document.getElementById('sekolah-field').classList.add('hidden');
      document.getElementById('mitra-fields').classList.add('hidden');
      
      if (role === 'siswa') {
        document.getElementById('kelas-field').classList.remove('hidden');
        document.getElementById('sekolah-field').classList.remove('hidden');
      } else if (role === 'guru') {
        document.getElementById('sekolah-field').classList.remove('hidden');
      } else if (role === 'mitra') {
        document.getElementById('mitra-fields').classList.remove('hidden');
      }
    }

    // Handle form submission
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const role = document.getElementById('role').value;
      const noWa = document.getElementById('noWa').value.trim();
      const kelas = document.getElementById('kelas').value.trim();
      const sekolah = document.getElementById('sekolah').value.trim();
      const namaMitra = document.getElementById('namaMitra').value.trim();
      const kategori = document.getElementById('kategori').value;
      const alamat = document.getElementById('alamat').value.trim();

      if (!role || !noWa) {
        showRegisterError('Mohon lengkapi semua data wajib');
        return;
      }

      if (role === 'mitra' && (!namaMitra || !kategori || !alamat)) {
        showRegisterError('Mohon lengkapi data toko');
        return;
      }

      const userData = {
        role: role,
        noWa: noWa,
        kelas: kelas,
        sekolah: sekolah,
        namaMitra: namaMitra,
        kategori: kategori,
        alamat: alamat
      };

      const result = await googleAuth.register(userData);
      
      if (!result.success) {
        showRegisterError(result.message);
      }
    });

    // Cancel registration
    document.getElementById('cancel-register').addEventListener('click', () => {
      showLoginSection();
      // Clear Google user
      if (window.google?.accounts?.identity) {
        window.google.accounts.identity.disableAutoSelect();
      }
    });

    function showRegisterError(message) {
      const errorEl = document.getElementById('register-error');
      errorEl.textContent = message;
      errorEl.classList.remove('hidden');
    }
  </script>

</body>
</html>

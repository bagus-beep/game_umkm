<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin - Spin Diskon UMKM</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen">

  <!-- Header -->
  <header class="glass-card border-b border-white/10">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center">
          <i class="fas fa-shield-alt text-white"></i>
        </div>
        <h1 class="text-xl font-bold">Admin <span class="text-gradient">Panel</span></h1>
      </div>
      
      <div class="flex items-center gap-4">
        <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">
          <i class="fas fa-moon" id="theme-icon"></i>
        </button>
        
        <div class="flex items-center gap-3 glass-card px-4 py-2">
          <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full">
          <span id="user-name" class="font-medium text-sm"></span>
          <button id="logout-btn" class="text-red-400 hover:text-red-300 ml-2">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-6 py-8">
    
    <!-- Welcome -->
    <div class="glass-card p-8 mb-8 animate-fade-in-up">
      <h2 class="text-3xl font-bold mb-2">Selamat Datang, <span class="text-gradient" id="welcome-name"></span>! 🛡️</h2>
      <p class="text-secondary">Kelola pengguna dan lihat statistik permainan</p>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="glass-card p-6 text-center animate-fade-in-up delay-1 hover:scale-105 transition-transform">
        <div class="text-4xl mb-3">👨‍🎓</div>
        <div class="text-3xl font-bold text-gradient" id="stat-siswa">-</div>
        <div class="text-sm text-muted">Total Siswa</div>
      </div>
      <div class="glass-card p-6 text-center animate-fade-in-up delay-2 hover:scale-105 transition-transform">
        <div class="text-4xl mb-3">🏪</div>
        <div class="text-3xl font-bold text-gradient" id="stat-mitra">-</div>
        <div class="text-sm text-muted">Total Mitra</div>
      </div>
      <div class="glass-card p-6 text-center animate-fade-in-up delay-3 hover:scale-105 transition-transform">
        <div class="text-4xl mb-3">👨‍🏫</div>
        <div class="text-3xl font-bold text-gradient" id="stat-guru">-</div>
        <div class="text-sm text-muted">Total Guru/Karyawan</div>
      </div>
      <div class="glass-card p-6 text-center animate-fade-in-up delay-4 hover:scale-105 transition-transform">
        <div class="text-4xl mb-3">🎮</div>
        <div class="text-3xl font-bold text-gradient" id="stat-today">-</div>
        <div class="text-sm text-muted">Main Hari Ini</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="glass-card p-6 mb-8 animate-fade-in-up delay-5">
      <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
        <i class="fas fa-bolt text-yellow-400"></i>
        Aksi Cepat
      </h3>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <button class="btn btn-primary">
          <i class="fas fa-user-plus"></i> Tambah Siswa
        </button>
        <button class="btn btn-primary bg-gradient-to-r from-green-500 to-emerald-500">
          <i class="fas fa-store"></i> Tambah Mitra
        </button>
        <button class="btn btn-primary bg-gradient-to-r from-purple-500 to-pink-500">
          <i class="fas fa-chalkboard-teacher"></i> Tambah Guru
        </button>
        <button class="btn btn-secondary">
          <i class="fas fa-chart-bar"></i> Laporan
        </button>
      </div>
    </div>

    <!-- Recent Activity -->
    <div class="glass-card p-6 animate-fade-in-up delay-5">
      <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
        <i class="fas fa-history text-cyan-400"></i>
        Aktivitas Terbaru
      </h3>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b border-white/10">
              <th class="pb-3 text-sm font-medium text-muted">Waktu</th>
              <th class="pb-3 text-sm font-medium text-muted">Email</th>
              <th class="pb-3 text-sm font-medium text-muted">Role</th>
              <th class="pb-3 text-sm font-medium text-muted">Aktivitas</th>
            </tr>
          </thead>
          <tbody id="activity-table">
            <tr>
              <td colspan="4" class="py-8 text-center text-muted">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p>Memuat data...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        icon.className = 'fas fa-sun';
      } else {
        html.setAttribute('data-theme', 'dark');
        icon.className = 'fas fa-moon';
      }
    }
  </script>

  <script type="module">
    import googleAuth from './js/auth/googleAuth.js';

    if (!googleAuth.isLoggedIn() || googleAuth.getRole() !== 'admin') {
      alert('Akses ditolak. Silakan login sebagai admin.');
      window.location.href = 'index.html';
    }

    const user = googleAuth.getUser();
    document.getElementById('user-avatar').src = user.picture;
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('welcome-name').textContent = user.name.split(' ')[0];

    document.getElementById('logout-btn').addEventListener('click', () => {
      googleAuth.logout();
    });

    // Load stats
    document.getElementById('stat-siswa').textContent = '0';
    document.getElementById('stat-mitra').textContent = '0';
    document.getElementById('stat-guru').textContent = '0';
    document.getElementById('stat-today').textContent = '0';
  </script>

</body>
</html>

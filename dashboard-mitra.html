<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Mitra - Spin Diskon UMKM</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="min-h-screen">

  <!-- Header -->
  <header class="glass-card border-b border-white/10">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center">
          <i class="fas fa-store text-white"></i>
        </div>
        <h1 class="text-xl font-bold">Dashboard <span class="text-gradient">Mitra</span></h1>
      </div>
      
      <div class="flex items-center gap-4">
        <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">
          <i class="fas fa-moon" id="theme-icon"></i>
        </button>
        
        <div class="flex items-center gap-3 glass-card px-4 py-2">
          <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full">
          <span id="user-name" class="font-medium text-sm"></span>
          <button id="logout-btn" class="text-red-400 hover:text-red-300 ml-2">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto px-6 py-8">
    
    <!-- Welcome -->
    <div class="glass-card p-8 mb-8 animate-fade-in-up">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-3xl font-bold mb-2">Hai, <span id="welcome-name" class="text-gradient"></span>! 🏪</h2>
          <p class="text-secondary">Kelola toko dan redeem voucher pelanggan</p>
        </div>
        <div class="hidden md:block">
          <div class="w-20 h-20 rounded-full bg-gradient-to-br from-green-400 to-emerald-600 flex items-center justify-center animate-float">
            <i class="fas fa-cash-register text-3xl text-white"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="glass-card p-6 text-center animate-fade-in-up delay-1">
        <div class="text-4xl mb-3">🎫</div>
        <div class="text-3xl font-bold text-gradient" id="voucher-redeemed">0</div>
        <div class="text-sm text-muted">Voucher Ditebus</div>
      </div>
      <div class="glass-card p-6 text-center animate-fade-in-up delay-2">
        <div class="text-4xl mb-3">💰</div>
        <div class="text-3xl font-bold text-gradient" id="total-discount">Rp 0</div>
        <div class="text-sm text-muted">Total Diskon Diberikan</div>
      </div>
      <div class="glass-card p-6 text-center animate-fade-in-up delay-3">
        <div class="text-4xl mb-3">👥</div>
        <div class="text-3xl font-bold text-gradient" id="customer-count">0</div>
        <div class="text-sm text-muted">Pelanggan Hari Ini</div>
      </div>
    </div>

    <!-- Redeem Section -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      
      <!-- Input Voucher -->
      <div class="glass-card p-6 animate-fade-in-up delay-4">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
          <i class="fas fa-qrcode text-green-400"></i>
          Redeem Voucher
        </h3>
        
        <div class="input-group mb-4">
          <input type="text" id="voucher-code" placeholder="Masukkan kode voucher" class="input">
          <i class="input-icon fas fa-ticket-alt"></i>
        </div>

        <button onclick="redeemVoucher()" class="btn btn-primary w-full mb-4">
          <i class="fas fa-check-circle"></i>
          Redeem Sekarang
        </button>

        <div id="redeem-result" class="p-4 rounded-lg text-center min-h-[80px]"></div>
      </div>

      <!-- Recent Redemptions -->
      <div class="glass-card p-6 animate-fade-in-up delay-5">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
          <i class="fas fa-history text-cyan-400"></i>
          Riwayat Redeem
        </h3>
        
        <div id="redeem-history" class="space-y-3">
          <p class="text-muted text-center py-8">
            <i class="fas fa-inbox text-3xl mb-3 block opacity-50"></i>
            Belum ada riwayat redeem
          </p>
        </div>
      </div>
    </div>

    <!-- Store Info -->
    <div class="glass-card p-6 mt-8 animate-fade-in-up delay-5">
      <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
        <i class="fas fa-store text-orange-400"></i>
        Info Toko
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="p-4 bg-white/5 rounded-lg">
          <div class="text-muted text-sm">Nama Toko</div>
          <div class="font-semibold" id="store-name">-</div>
        </div>
        <div class="p-4 bg-white/5 rounded-lg">
          <div class="text-muted text-sm">Kategori</div>
          <div class="font-semibold" id="store-category">-</div>
        </div>
        <div class="p-4 bg-white/5 rounded-lg">
          <div class="text-muted text-sm">Alamat</div>
          <div class="font-semibold" id="store-address">-</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const icon = document.getElementById('theme-icon');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light');
        icon.className = 'fas fa-sun';
      } else {
        html.setAttribute('data-theme', 'dark');
        icon.className = 'fas fa-moon';
      }
    }

    function redeemVoucher() {
      const code = document.getElementById('voucher-code').value.trim();
      const result = document.getElementById('redeem-result');
      
      if (!code) {
        result.innerHTML = '<span class="text-red-400"><i class="fas fa-exclamation-circle"></i> Masukkan kode voucher</span>';
        return;
      }
      
      result.innerHTML = '<span class="text-yellow-400"><i class="fas fa-spinner fa-spin"></i> Memvalidasi...</span>';
      
      // Simulate API call
      setTimeout(() => {
        result.innerHTML = '<span class="text-green-400"><i class="fas fa-check-circle"></i> Voucher valid! Diskon 20% berhasil diterapkan</span>';
      }, 1500);
    }
  </script>

  <script type="module">
    import googleAuth from './js/auth/googleAuth.js';

    if (!googleAuth.isLoggedIn() || googleAuth.getRole() !== 'mitra') {
      alert('Akses ditolak. Silakan login sebagai mitra.');
      window.location.href = 'index.html';
    }

    const user = googleAuth.getUser();
    document.getElementById('user-avatar').src = user.picture;
    document.getElementById('user-name').textContent = user.name;
    document.getElementById('welcome-name').textContent = user.name.split(' ')[0];

    if (user.profile) {
      document.getElementById('store-name').textContent = user.profile.namaMitra || '-';
      document.getElementById('store-category').textContent = user.profile.kategori || '-';
      document.getElementById('store-address').textContent = user.profile.alamat || '-';
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      googleAuth.logout();
    });
  </script>

</body>
</html>

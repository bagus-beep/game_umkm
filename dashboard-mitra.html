<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Mitra - Spin Diskon UMKM</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-purple-600 text-white p-4 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl font-bold">🎡 Dashboard Mitra</h1>
      <div class="flex items-center gap-3">
        <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border-2 border-white">
        <span id="user-name" class="text-sm"></span>
        <button id="logout-btn" class="ml-2 bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-sm">
          Logout
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto p-6">
    
    <!-- Welcome Card -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <h2 class="text-2xl font-bold mb-2">Halo, Mitra! 🏪</h2>
      <p class="text-gray-600">Kelola voucher dan lihat statistik diskon</p>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl shadow p-4">
        <div class="text-gray-500 text-sm">Voucher Ditebus Hari Ini</div>
        <div class="text-3xl font-bold text-green-600" id="stat-redeemed">0</div>
      </div>
      <div class="bg-white rounded-xl shadow p-4">
        <div class="text-gray-500 text-sm">Total Voucher Aktif</div>
        <div class="text-3xl font-bold text-blue-600" id="stat-active">0</div>
      </div>
      <div class="bg-white rounded-xl shadow p-4">
        <div class="text-gray-500 text-sm">Total Nilai Diskon</div>
        <div class="text-3xl font-bold text-orange-600" id="stat-total">Rp 0</div>
      </div>
    </div>

    <!-- Redeem Section -->
    <div class="bg-white rounded-xl shadow p-6 mb-6">
      <h3 class="text-lg font-bold mb-4">🔄 Redeem Voucher</h3>
      <div class="flex gap-4">
        <input 
          id="voucher-code"
          type="text"
          placeholder="Masukkan kode voucher"
          class="border p-3 rounded flex-1"
        />
        <button
          onclick="redeemVoucher()"
          class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded font-medium"
        >
          Redeem
        </button>
      </div>
      <div id="redeem-result" class="mt-4"></div>
    </div>

    <!-- Recent Redemptions -->
    <div class="bg-white rounded-xl shadow p-6">
      <h3 class="text-lg font-bold mb-4">📜 Riwayat Redemption</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b">
              <th class="pb-2">Waktu</th>
              <th class="pb-2">Kode Voucher</th>
              <th class="pb-2">Diskon</th>
              <th class="pb-2">Status</th>
            </tr>
          </thead>
          <tbody id="redemption-table">
            <tr>
              <td colspan="4" class="py-4 text-center text-gray-500">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script type="module">
    import googleAuth from './js/auth/googleAuth.js';

    // Check auth
    if (!googleAuth.isLoggedIn() || googleAuth.getRole() !== 'mitra') {
      alert('Akses ditolak. Silakan login sebagai mitra.');
      window.location.href = 'index.html';
    }

    const user = googleAuth.getUser();
    
    // Display user info
    document.getElementById('user-avatar').src = user.picture;
    document.getElementById('user-name').textContent = user.name;

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      googleAuth.logout();
    });

    // Redeem voucher function
    function redeemVoucher() {
      const code = document.getElementById('voucher-code').value.trim();
      const resultEl = document.getElementById('redeem-result');
      
      if (!code) {
        resultEl.innerHTML = '<p class="text-red-500">Masukkan kode voucher terlebih dahulu</p>';
        return;
      }

      // Placeholder - integrate with backend API
      resultEl.innerHTML = '<p class="text-gray-500">Memproses voucher...</p>';
      
      setTimeout(() => {
        resultEl.innerHTML = '<p class="text-green-500">Voucher berhasil diredem!</p>';
      }, 1000);
    }

    window.redeemVoucher = redeemVoucher;
  </script>

</body>
</html>
